name: build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # waiting on: https://github.com/actions/setup-node/issues/531
      - run: corepack enable
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - name: test built package on node@24
        working-directory: ./package-test/
        run: |
          pnpm install --frozen-lockfile

          node -v
          node test.cjs
          node test.mjs

      # lint comes after because the package-test directory needs to be
      # installed for the type-aware linting to work
      - run: pnpm lint

      # Not using a matrix here since it's simpler
      # to just duplicate it and not spawn new instances

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
      - name: test build package on node@20
        working-directory: ./package-test/
        run: |
          node -v
          node test.cjs
          node test.mjs

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
      - name: test build package on node@20
        working-directory: ./package-test/
        run: |
          node -v
          node test.cjs
          node test.mjs
